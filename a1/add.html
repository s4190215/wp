<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Inter&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" type="image/png" href="assets/images/pets/favicon.ico">
</head>

<body>

<header>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container d-flex align-items-center">

      <!-- LOGO -->
      <div class="d-flex align-items-center">
        <span class="material-icons me-2">pets</span>
        <a class="navbar-brand fw-semibold m-0" href="index.html">PetConnect</a>
      </div>

      <!-- TOGGLE -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- LINKS -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav align-items-center ms-4">

          <li class="nav-item">
            <a class="nav-link d-flex align-items-center" href="index.html">
              <span class="material-icons me-1" style="font-size:18px;">home</span>
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link d-flex align-items-center" href="pets.html">
              <span class="material-icons me-1" style="font-size:18px;">list</span>
              Browse Pets
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link d-flex align-items-center" href="gallery.html">
              <span class="material-icons me-1" style="font-size:18px;">photo</span>
              Gallery
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link d-flex align-items-center" href="add.html">
              <span class="material-icons me-1" style="font-size:18px;">add_circle</span>
              Add Pet
            </a>
          </li>

        </ul>
      </div>

    </div>
  </nav>
</header>

<main class="container my-5">

  <h1 class="mb-4">
    <span class="material-icons">add_circle</span>
    Add a New Pet for Adoption
  </h1>

  <form>

    <div class="row g-3">

      <!-- Pet Name -->
      <div class="col-md-6">
        <label class="form-label">Pet Name *</label>
        <input type="text" class="form-control" required placeholder="Enter pet name">
      </div>

      <!-- Species -->
      <div class="col-md-6">
        <label class="form-label">Species *</label>
        <select class="form-control" required>
          <option value="">Select species</option>
          <option>Dog</option>
          <option>Cat</option>
          <option>Bird</option>
          <option>Rabbit</option>
          <option>Other</option>
        </select>
      </div>

      <!-- Breed -->
      <div class="col-md-6">
        <label class="form-label">Breed</label>
        <input type="text" class="form-control" placeholder="Enter breed">
      </div>

      <!-- Age -->
      <div class="col-md-3">
        <label class="form-label">Age (Years)</label>
        <input type="number" class="form-control" placeholder="Years">
      </div>

      <div class="col-md-3">
        <label class="form-label">Age (Months)</label>
        <input type="number" class="form-control" placeholder="Months">
      </div>

      <!-- Gender -->
      <div class="col-md-4">
        <label class="form-label">Gender *</label>
        <select class="form-control" required>
          <option value="">Select gender</option>
          <option>Male</option>
          <option>Female</option>
        </select>
      </div>

      <!-- Size -->
      <div class="col-md-4">
        <label class="form-label">Size *</label>
        <select class="form-control" required>
          <option value="">Select size</option>
          <option>Small</option>
          <option>Medium</option>
          <option>Large</option>
        </select>
      </div>

      <!-- Fee -->
      <div class="col-md-4">
        <label class="form-label">Adoption Fee ($) *</label>
        <input type="number" class="form-control" required placeholder="Enter fee">
      </div>

      <!-- Description -->
      <div class="col-12">
        <label class="form-label">Description *</label>
        <textarea class="form-control" rows="3" required placeholder="Describe the pet's personality and characteristics"></textarea>
      </div>

      <!-- Health -->
      <div class="col-12">
        <label class="form-label">Health Information</label>
        <textarea class="form-control" rows="2" placeholder="Enter health and vaccination information"></textarea>
      </div>

      <!-- Status -->
      <div class="col-12">
        <label class="form-label">Status *</label>
        <select class="form-control" required>
          <option value="">Select status</option>
          <option>Available</option>
          <option>Pending</option>
          <option>Adopted</option>
        </select>
      </div>

      <!-- Image -->
      <div class="col-12">
        <label class="form-label">📷 Pet Photo</label>

        <div class="upload-box p-3 text-center">
            <input type="file" id="imageInput" class="form-control border-0 bg-transparent">
        </div>

        <!-- MESSAGE -->
        <div id="imageMessage" class="mt-2 text-success small" style="display:none;"></div>

        <!-- PREVIEW -->
        <img id="preview" class="mt-3 preview-img" style="display:none;">
        </div>

      <!-- Buttons -->
      <div class="col-12 mt-3">
        <button type="submit" class="btn btn-primary me-2">
        <span class="material-icons align-middle">add</span> Add Pet
        </button>

        <button type="reset" class="btn btn-danger">
        <span class="material-icons align-middle">cancel</span> Cancel
        </button>
      </div>

    </div>

  </form>

</main>

<footer class="text-center text-white py-3">
  © 2026 s123456. Connecting pets with loving homes.
</footer>

</body>
</html>
